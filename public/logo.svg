<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Brand linear gradient with extremely premium modern SaaS colors -->
    <linearGradient id="brand-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f355da" />
      <stop offset="100%" stop-color="#7000ff" />
    </linearGradient>
  </defs>

  <!-- Outer radar scanning circle segment (clean thick arc) -->
  <path d="M 126 126 A 184 184 0 1 1 386 386" fill="none" stroke="url(#brand-grad)" stroke-width="24" stroke-linecap="round" />

  <!-- Target crosshair inner circle -->
  <circle cx="256" cy="256" r="80" fill="none" stroke="url(#accent-grad)" stroke-width="14" stroke-dasharray="16 12" />

  <!-- Inner bullseye dot -->
  <circle cx="256" cy="256" r="24" fill="url(#accent-grad)" />

  <!-- Crosshair ticks / indicators -->
  <line x1="256" y1="40" x2="256" y2="76" stroke="url(#brand-grad)" stroke-width="20" stroke-linecap="round" />
  <line x1="472" y1="256" x2="436" y2="256" stroke="url(#brand-grad)" stroke-width="20" stroke-linecap="round" />
  <line x1="256" y1="472" x2="256" y2="436" stroke="url(#brand-grad)" stroke-width="20" stroke-linecap="round" />
  <line x1="40" y1="256" x2="76" y2="256" stroke="url(#brand-grad)" stroke-width="20" stroke-linecap="round" />

  <!-- A sharp, precise, vector pointer arrow / cursor that is finding the lead, pointing directly to the center bullseye -->
  <path d="M 370 142 L 285 227 M 285 227 L 320 227 M 285 227 L 285 192" stroke="url(#accent-grad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- A small glowing spark to the target center for premium detail -->
  <circle cx="256" cy="256" r="6" fill="#ffffff" />
</svg>
